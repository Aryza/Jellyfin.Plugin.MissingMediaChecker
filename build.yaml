targetAbi: "10.11.0.0"
framework: "net9.0"
owner: "Ary"
category: "General"
overview: "Finds missing TV episodes and collection movies via TMDB."
description: >-
  Scans your Jellyfin library and compares it against TMDB to identify missing
  episodes, whole seasons, and movies belonging to collections. Generates a
  sortable, filterable report accessible from the plugin page.
artifacts:
  - "Jellyfin.Plugin.MissingMediaChecker.dll"
changelog: |-
  - Perf: Jellyfin web UI no longer freezes during a scan
    - Bulk-load all episodes in one SQLite query instead of N parallel AncestorIds queries
    - Lower TMDB/parallel concurrency from 16 → 8 to leave threadpool headroom for the UI
    - Pre-filter movie scan to skip already-mapped BoxSet movies before the parallel HTTP phase
    - Remove redundant Task.Run wrappers around sync DB calls
  - Removed "Recently released" and "Recently aired" home sections
  - Renamed "Trending (in library)" → "Trending from your library"
  - Fix: page blank/Safari decode error when FileTransformation plugin present —
    ScriptInjectionMiddleware now decompresses gzip/deflate/br before injecting pill
