overview: "Finds missing TV episodes and collection movies via TMDB."
description: >-
  Scans your Jellyfin library and compares it against TMDB to identify missing
  episodes, whole seasons, and movies belonging to collections. Generates a
  sortable, filterable report accessible from the plugin page.
artifacts:
  - "Jellyfin.Plugin.MissingMediaChecker.dll"
changelog: |-
  - Calendar UX overhaul: agenda view (poster + date column + 2-line overview +
    TMDB/Jellyfin links) and month-grid view (next 3 months, Mon–Sun, compact
    poster + episode number per cell). Toggle between views in the toolbar.
  - Refresh button now shows spinner while loading, flashes green "✓ Updated"
    on success, and re-enables after 2 s — no more silent loading.
  - Yesterday row dimmed with its own divider; Today divider in blue.
  - Summary chips (N upcoming episodes / N upcoming movies) above the list.
  - Month grid: today cell highlighted in blue; past cells dimmed; each item
    is a clickable pill linking to TMDB.
