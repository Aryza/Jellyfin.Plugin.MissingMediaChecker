version: "2.1.0.0"
targetAbi: "10.11.0.0"
framework: "net9.0"
owner: "Ary"
category: "General"
overview: "Finds missing TV episodes and collection movies via TMDB."
description: >-
  Scans your Jellyfin library and compares it against TMDB to identify missing
  episodes, whole seasons, and movies belonging to collections. Generates a
  sortable, filterable report accessible from the plugin page.
artifacts:
  - "Jellyfin.Plugin.MissingMediaChecker.dll"
changelog: |-
  - New: Release Calendar tab — upcoming next-episode-to-air for owned series
    plus future-release movies in box-set collections you already own at least
    one part of. Configurable lookahead window (default 90 days) and result
    cache TTL (default 6 h). Force-refresh button bypasses cache.
  - Backend: GET /MissingMedia/Calendar endpoint + CalendarService.
  - TmdbSeriesDetails now exposes next_episode_to_air / last_episode_to_air.
  - SectionContentCache.Invalidate(key) for per-key cache busting.
