name: "Missing Media Checker"
guid: "9b8e1c4a-2d3f-4e5b-a6c7-d8e9f0a1b2c3"
version: "1.1.0.0"
targetAbi: "10.11.0.0"
framework: "net9.0"
owner: "Ary"
category: "General"
overview: "Finds missing TV episodes and collection movies via TMDB."
description: >-
  Scans your Jellyfin library and compares it against TMDB to identify missing
  episodes, whole seasons, and movies belonging to collections. Generates a
  sortable, filterable report accessible from the plugin page.
artifacts:
  - "Jellyfin.Plugin.MissingMediaChecker.dll"
changelog: |-
  - New since last scan: highlights newly missing items since previous run
  - Season badges on collapsed series headers (fully missing = red, partial = amber)
  - Poster thumbnails from TMDB shown in group headers
  - Ignore list: suppress episodes, seasons, series, movies, or collections from the UI
  - Incremental/smart scan: skips ended series with unchanged episode counts to reduce TMDB API usage
  - Recently-aired-only mode: filter results to a configurable day window
  - Paginated streaming API: /Results/Summary and /Results/Groups endpoints
  - Plugin notifications: posts a Jellyfin activity-log entry when new missing media is found
